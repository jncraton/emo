<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Emoji Picker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <h1 id="title">Emoji Picker</h1>
    <label for="q" class="visually-hidden">Search emojis</label>
    <input id="q" type="search" placeholder="Type to search emojis" autocomplete="off" />
    <div id="count" aria-live="polite"></div>
    <ul id="results" role="listbox" aria-label="Emoji results"></ul>
    <div id="copied" role="status" aria-live="polite" hidden>Copied</div>
  </main>
  <script src="emojis.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
